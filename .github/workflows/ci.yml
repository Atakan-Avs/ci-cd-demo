name: CI-CD Pipeline

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: |
          pip install -r requirements.txt

      - name: Lint
        run: ruff check .

      - name: Test
        run: pytest

      - name: Setup Docker
        uses: docker/setup-buildx-action@v3

      - name: Build Image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: ci-cd-demo:latest

  cd:
    runs-on: ubuntu-latest
    needs: ci   #önemli cünkü cd job , Cl basarılı olmadan calısmaz

    steps:
      - name: Deploy (simulate)
        run: |
          echo "🚀 Deploy başladı"
          echo "Container çalıştırılıyor..."
          echo "Deploy başarılı!"